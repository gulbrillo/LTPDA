services:

  # ── Bundled MySQL (only used when started with --profile bundled) ──────────
  mysql:
    profiles: ["bundled"]
    image: mysql:8
    restart: unless-stopped
    command:
      - --max-allowed-packet=268435456   # 256 MB — required for LTPDA binary object BLOBs
      - --innodb-buffer-pool-size=256M   # tunable; increase for better performance on large repos
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"       # allow root login from any host (Docker network)
    ports:
      - "127.0.0.1:3307:3306"   # localhost only (3306 taken by host MySQL) — MATLAB users access via SSH tunnel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: reach host machine (external MySQL or SSH sync daemon)
    volumes:
      - ./config:/app/config                  # persists config.json across restarts
    depends_on:
      mysql:
        condition: service_healthy
        required: false   # optional: ignored in external-MySQL mode (no mysql service); waits in bundled mode
    networks:
      - internal

  # ── nginx: serves Nuxt SPA + proxies /api/ to FastAPI ────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"                  # localhost only — Apache/Nginx proxies this
    volumes:
      - ./frontend/.output/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
