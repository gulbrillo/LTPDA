services:

  # ── Bundled MySQL (only used when started with --profile bundled) ──────────
  mysql:
    profiles: ["bundled"]
    image: mysql:8
    restart: unless-stopped
    command:
      - --max-allowed-packet=268435456   # 256 MB — required for LTPDA binary object BLOBs
      - --innodb-buffer-pool-size=256M   # tunable; increase for better performance on large repos
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"       # allow root login from any host (Docker network)
    ports:
      - "127.0.0.1:3307:3306"   # localhost only — fallback: manual host SSH tunnel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      internal:
        aliases:
          - db     # sshgateway validate_auth.py connects to MYSQL_HOST=db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: reach host machine (external MySQL)
    volumes:
      - ./config:/app/config                  # persists config.json across restarts
      - phpmyadmin_config:/app/phpmyadmin-config  # shared with phpMyAdmin for PHP config injection
    depends_on:
      mysql:
        condition: service_healthy
        required: false   # optional: ignored in external-MySQL mode (no mysql service); waits in bundled mode
    networks:
      - internal

  # ── SSH gateway (bundled mode only) ───────────────────────────────────────
  # Allows MATLAB users to open an SSH tunnel into MySQL:
  #   ssh -L 3306:db:3306 -p 2222 username@repo.yourdomain.com
  # Auth is delegated entirely to MySQL — no Linux host accounts needed.
  # Port 2222 must be open in the server firewall: sudo ufw allow 2222/tcp
  sshgateway:
    profiles: ["bundled"]
    build: ./sshgateway
    restart: unless-stopped
    ports:
      - "2222:22"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DB: ${ADMIN_DB:-ltpda_admin}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    networks:
      - internal

  # ── phpMyAdmin — database management UI (bundled mode only) ─────────────
  phpmyadmin:
    profiles: ["bundled"]
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 256M       # match MySQL max_allowed_packet
    volumes:
      - phpmyadmin_config:/etc/phpmyadmin/conf.d  # receives PmaAbsoluteUri config from API
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    networks:
      - internal

  # ── nginx: serves Nuxt SPA + proxies /api/ to FastAPI ────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"                  # localhost only — Apache/Nginx proxies this
    volumes:
      - ./frontend/.output/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
  phpmyadmin_config:    # shared between api (writes PHP config) and phpmyadmin (reads it)
